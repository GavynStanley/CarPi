# /etc/dnsmasq.conf — SignalKit DHCP Server
# Assigns IP addresses to phones that connect to the SignalKit hotspot.
# Also resolves signalkit.local to the Pi's IP for easy bookmarking.

# Only listen on the hotspot interface
interface=wlan0

# DHCP range: assign addresses 192.168.4.2 - 192.168.4.50
# Lease time: 24 hours (phones keep the same IP for a full day)
dhcp-range=192.168.4.2,192.168.4.50,255.255.255.0,24h

# Local domain — lets you access the Pi at http://signalkit.local:5000
domain=signalkit.local
address=/signalkit.local/192.168.4.1

# Don't forward local DNS queries upstream (no internet, so don't try)
bogus-priv
no-resolv

# Don't read /etc/resolv.conf (we handle all DNS ourselves)
no-poll

# --- Captive Portal ---
# Resolve ALL DNS queries to the Pi's IP so phones auto-detect the
# captive portal and open the SignalKit dashboard automatically on connect.
address=/#/192.168.4.1
