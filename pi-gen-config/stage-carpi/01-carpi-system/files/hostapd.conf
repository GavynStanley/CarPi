# /etc/hostapd/hostapd.conf — CarPi WiFi Access Point
# Creates the "CarPi" WiFi network that phones connect to.
# No internet needed — phone just connects and opens http://192.168.4.1:5000

# Interface to use as the access point
interface=wlan0

# nl80211 is the standard Linux WiFi driver interface
driver=nl80211

# The network name your phone will see
ssid=CarPi

# 802.11g = 2.4GHz (compatible with all phones)
# Use hw_mode=a + channel=36 for 5GHz if your Pi Zero 2 W supports it
hw_mode=g

# Channel 6 is reliable and rarely congested
channel=6

# Advertise the SSID (don't hide the network)
ignore_broadcast_ssid=0

# No authentication (open network) — fast to connect, no password needed
# To add WPA2 password, uncomment the lines below and remove auth_algs=1:
auth_algs=1

# --- WPA2 Password (optional) ---
# Uncomment these lines to require a password to connect:
# wpa=2
# wpa_passphrase=YourPasswordHere
# wpa_key_mgmt=WPA-PSK
# wpa_pairwise=TKIP
# rsn_pairwise=CCMP

# Power management
wmm_enabled=0
macaddr_acl=0
