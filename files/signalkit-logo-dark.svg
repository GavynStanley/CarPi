<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" width="320" height="64">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="320" height="64" fill="#0e0e0e" rx="8"/>

  <!-- Signal bars mark -->
  <!-- Bar 1 (shortest, most transparent) -->
  <rect x="16" y="44" width="6" height="8" rx="2" fill="#DC2626" opacity="0.32"/>
  <!-- Bar 2 -->
  <rect x="25" y="38" width="6" height="14" rx="2" fill="#DC2626" opacity="0.55"/>
  <!-- Bar 3 -->
  <rect x="34" y="30" width="6" height="22" rx="2" fill="#DC2626" opacity="0.78"/>
  <!-- Bar 4 (tallest, full) -->
  <rect x="43" y="20" width="6" height="32" rx="2" fill="#DC2626"/>

  <!-- Wordmark: "Signal" in white, "Kit" in red -->
  <!-- Using a fallback geometric approach since web fonts won't embed in SVG reliably -->
  <text x="60" y="44"
    font-family="Syne, 'Arial Black', sans-serif"
    font-weight="800"
    font-size="32"
    letter-spacing="-0.5"
    fill="#ffffff">Signal</text>
  <text x="178" y="44"
    font-family="Syne, 'Arial Black', sans-serif"
    font-weight="800"
    font-size="32"
    letter-spacing="-0.5"
    fill="#DC2626">Kit</text>
</svg>
