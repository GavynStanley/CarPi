<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bgGlow" cx="30%" cy="20%" r="65%">
      <stop offset="0%" stop-color="#DC2626" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#DC2626" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgBase" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0808"/>
      <stop offset="100%" stop-color="#0c0c0c"/>
    </radialGradient>
    <linearGradient id="sheen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="roundedClip">
      <rect width="1024" height="1024" rx="230.4"/>
    </clipPath>
  </defs>

  <!-- Base background -->
  <rect width="1024" height="1024" fill="url(#bgBase)" rx="230.4"/>

  <!-- Red glow overlay -->
  <rect width="1024" height="1024" fill="url(#bgGlow)" clip-path="url(#roundedClip)"/>

  <!-- Waveform hint at bottom -->
  <polyline
    points="0,820 120,820 168,680 216,960 264,820 384,820 432,600 480,1040 528,820 1024,820"
    fill="none" stroke="#DC2626" stroke-width="18" stroke-opacity="0.10"
    stroke-linecap="round" stroke-linejoin="round"
    clip-path="url(#roundedClip)"/>

  <!-- Signal bars — centred vertically, slightly above midpoint -->
  <!-- Bar 1: shortest -->
  <rect x="196" y="640" width="100" height="160" rx="28" fill="#DC2626" opacity="0.28"/>
  <!-- Bar 2 -->
  <rect x="336" y="520" width="100" height="280" rx="28" fill="#DC2626" opacity="0.54"/>
  <!-- Bar 3 -->
  <rect x="476" y="360" width="100" height="440" rx="28" fill="#DC2626" opacity="0.78"/>
  <!-- Bar 4: tallest -->
  <rect x="616" y="164" width="100" height="636" rx="28" fill="#DC2626"/>

  <!-- Corner light sheen -->
  <rect width="1024" height="1024" fill="url(#sheen)" rx="230.4"/>
</svg>
